<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>ADB Wireless Debug</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="styles.css" />
</head>
<body>
  <div class="app-container">
    <!-- Header -->
    <header class="app-header">
      <div class="header-left">
        <div class="logo-icon">
          <svg width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M5 12.55a11 11 0 0 1 14.08 0" />
            <path d="M8.53 16.11a6 6 0 0 1 6.95 0" />
            <circle cx="12" cy="20" r="1" />
          </svg>
        </div>
        <div>
          <h1>ADB Wireless Debug</h1>
          <p class="subtitle">One-click wireless Android debugging</p>
        </div>
      </div>
      <div class="header-right">
        <div id="adb-status" class="status-badge status-checking">
          <span class="status-dot"></span>
          <span id="adb-status-text">Checking ADB...</span>
        </div>
      </div>
    </header>

    <!-- Toolbar -->
    <div class="toolbar">
      <button id="refresh-btn" class="btn btn-primary" onclick="refreshDevices()">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <polyline points="23 4 23 10 17 10" />
          <polyline points="1 20 1 14 7 14" />
          <path d="M3.51 9a9 9 0 0 1 14.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0 0 20.49 15" />
        </svg>
        Refresh Devices
      </button>
      <span id="device-count" class="device-count">0 devices</span>
    </div>

    <!-- Device List -->
    <div id="device-list" class="device-list">
      <div class="empty-state">
        <svg width="48" height="48" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round" class="empty-icon">
          <rect x="5" y="2" width="14" height="20" rx="2" ry="2" />
          <line x1="12" y1="18" x2="12.01" y2="18" />
        </svg>
        <p>No devices detected</p>
        <p class="empty-hint">Connect an Android device via USB with USB Debugging enabled</p>
      </div>
    </div>

    <!-- Log Panel -->
    <div class="log-panel">
      <div class="log-header">
        <span>Activity Log</span>
        <button class="btn-text" onclick="clearLog()">Clear</button>
      </div>
      <div id="log-content" class="log-content">
        <div class="log-entry log-info">App started. Checking ADB status...</div>
      </div>
    </div>
  </div>

  <script src="main.js" type="module"></script>
</body>
</html>
