name: Auto Release

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build-and-release:
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: ubuntu-latest
            target: x86_64-unknown-linux-gnu
          - platform: macos-latest
            target: x86_64-apple-darwin
          - platform: windows-latest
            target: x86_64-pc-windows-msvc

    runs-on: ${{ matrix.platform }}

    steps:
    - uses: actions/checkout@v4

    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'

    - name: Setup Rust
      uses: dtolnay/rust-toolchain@stable
      with:
        targets: ${{ matrix.target }}

    - name: Rust cache
      uses: swatinem/rust-cache@v2
      with:
        workspaces: './src-tauri -> target'

    - name: Install dependencies (Ubuntu only)
      if: matrix.platform == 'ubuntu-latest'
      run: |
        sudo apt-get update
        sudo apt-get install -y libgtk-3-dev libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf

    - name: Install frontend dependencies
      run: npm ci

    - name: Build application
      run: npm run build

    - name: Prepare artifacts (Windows)
      if: matrix.platform == 'windows-latest'
      shell: bash
      run: |
        mkdir -p release-artifacts
        cp src-tauri/target/release/bundle/msi/*.msi release-artifacts/ 2>/dev/null || true
        cp src-tauri/target/release/bundle/nsis/*.exe release-artifacts/ 2>/dev/null || true

    - name: Prepare artifacts (macOS)
      if: matrix.platform == 'macos-latest'
      run: |
        mkdir -p release-artifacts
        cp -r src-tauri/target/release/bundle/dmg/*.dmg release-artifacts/ 2>/dev/null || true
        cp -r src-tauri/target/release/bundle/macos/*.app release-artifacts/ 2>/dev/null || true

    - name: Prepare artifacts (Linux)
      if: matrix.platform == 'ubuntu-latest'
      run: |
        mkdir -p release-artifacts
        cp src-tauri/target/release/bundle/deb/*.deb release-artifacts/ 2>/dev/null || true
        cp src-tauri/target/release/bundle/appimage/*.AppImage release-artifacts/ 2>/dev/null || true

    - name: Upload artifacts
      uses: actions/upload-artifact@v4
      with:
        name: artifacts-${{ matrix.platform }}
        path: release-artifacts/*
        retention-days: 7

  create-release:
    needs: build-and-release
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
    - uses: actions/checkout@v4

    - name: Download all artifacts
      uses: actions/download-artifact@v4
      with:
        path: all-artifacts

    - name: Display structure
      run: ls -R all-artifacts

    - name: Get current date
      id: date
      run: echo "date=$(date +'%Y-%m-%d %H:%M:%S')" >> $GITHUB_OUTPUT

    - name: Delete existing latest release
      continue-on-error: true
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      run: |
        gh release delete latest --yes || true
        git push origin :refs/tags/latest || true

    - name: Create/Update Latest Release
      uses: softprops/action-gh-release@v1
      with:
        tag_name: latest
        name: "Latest Build (Auto-generated)"
        body: |
          ## 🚀 Latest Development Build
          
          **Built on:** ${{ steps.date.outputs.date }}
          **Commit:** ${{ github.sha }}
          
          This is an automatically generated release from the latest commit on the main branch.
          
          ### 📦 Downloads
          - **Windows**: `.msi` or `.exe` installer
          - **macOS**: `.dmg` disk image
          - **Linux**: `.deb` package or `.AppImage`
          
          ### ⚠️ Note
          This is a development build and may contain bugs. For stable releases, check tagged versions.
          
          ---
          [View Commit](https://github.com/${{ github.repository }}/commit/${{ github.sha }})
        files: |
          all-artifacts/**/*
        draft: false
        prerelease: true
      env:
        GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
